<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Suspicious Activity Reports</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f7fa;
      margin: 0;
      padding: 40px;
    }

    h2 {
      margin-bottom: 10px;
    }

    .container {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    th {
      background-color: #f0f2f5;
      color: #333;
      font-weight: bold;
    }

    .status-button {
      padding: 6px 12px;
      border: none;
      border-radius: 20px;
      background-color: #ff5c88;
      color: white;
      cursor: pointer;
      font-size: 12px;
    }

    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background-color: white;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.1);
      border-radius: 8px;
      z-index: 1;
      min-width: 220px;
    }

    .dropdown-content label {
      display: block;
      padding: 10px;
      cursor: pointer;
    }

    .dropdown-content label:hover {
      background-color: #f0f0f0;
    }

    .dropdown.active .dropdown-content {
      display: block;
    }

    .filter-select {
      padding: 5px 10px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

  <h2>Administrator</h2>
  <h1><strong>Suspicious Activity Reports</strong></h1>

  <div class="container">
    <table>
      <thead>
        <tr>
          <th>Contest ID</th>
          <th>Problem Number</th>
          <th>Suspected User</th>
          <th>Language</th>
          <th>Reported By</th>
          <th>
            Status
            <div class="dropdown" id="statusDropdown">
              <button class="filter-select" onclick="toggleDropdown()">▼</button>
              <div class="dropdown-content">
                <label><input type="radio" name="status" /> New</label>
                <label><input type="radio" name="status" /> Under Investigation</label>
                <label><input type="radio" name="status" /> Resolved - No Action</label>
                <label><input type="radio" name="status" /> Resolved - Action Taken</label>
              </div>
            </div>
          </th>
        </tr>
      </thead>
      <tbody id="reportTableBody">
       
      </tbody>
    </table>
  </div>

  <script>
    const tableData = [
      { id: 1, problem: 20001, user: "000", lang: "python", reporter: "@xyz" },
      { id: 2, problem: 20012, user: "345", lang: "java", reporter: "@1ami" },
      { id: 3, problem: 20021, user: "346", lang: "java", reporter: "@catcoder" },
      { id: 4, problem: 20022, user: "665", lang: "c++", reporter: "@pedropascal067" },
      { id: 5, problem: 20027, user: "111", lang: "python", reporter: "@codexharry" },
      { id: 6, problem: 20024, user: "034", lang: "python", reporter: "@arin" },
      { id: 7, problem: 20021, user: "234", lang: "python", reporter: "@sahibcodes" },
      { id: 8, problem: 20024, user: "010", lang: "c++", reporter: "@sakib678" },
      { id: 9, problem: 20023, user: "130", lang: "java", reporter: "@sadik" },
      { id: 10, problem: 20023, user: "089", lang: "python", reporter: "@lucy789" },
    ];

    const tbody = document.getElementById("reportTableBody");

    tableData.forEach(row => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${row.id}</td>
        <td>${row.problem}</td>
        <td>${row.user}</td>
        <td>${row.lang}</td>
        <td>${row.reporter}</td>
        <td><button class="status-button">Resolved </button></td>
      `;
      tbody.appendChild(tr);
    });

    function toggleDropdown() {
      document.getElementById("statusDropdown").classList.toggle("active");
    }

    document.addEventListener("click", function(event) {
      if (!event.target.closest("#statusDropdown")) {
        document.getElementById("statusDropdown").classList.remove("active");
      }
    });
  </script>
</body>
</html>
